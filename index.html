<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>개인 소개 | My Portfolio</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: "Segoe UI", "Malgun Gothic", sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #333;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    .card {
      background: #fff;
      border-radius: 20px;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.2);
      max-width: 600px;
      width: 100%;
      overflow: hidden;
    }

    .header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #fff;
      text-align: center;
      padding: 50px 20px 70px;
      position: relative;
    }

    .avatar {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      background: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 48px;
      margin: 0 auto 16px;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
    }

    .header h1 {
      font-size: 28px;
      margin-bottom: 6px;
    }

    .header p {
      font-size: 15px;
      opacity: 0.9;
    }

    .content {
      padding: 36px 32px;
    }

    .section {
      margin-bottom: 28px;
    }

    .section:last-child {
      margin-bottom: 0;
    }

    .section h2 {
      font-size: 18px;
      color: #764ba2;
      margin-bottom: 12px;
      border-left: 4px solid #764ba2;
      padding-left: 10px;
    }

    .section p {
      line-height: 1.7;
      color: #555;
    }

    .skills {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .skill {
      background: #f0ecfa;
      color: #764ba2;
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 14px;
      font-weight: 500;
    }

    .contact-list {
      list-style: none;
    }

    .contact-list li {
      padding: 6px 0;
      color: #555;
    }

    .contact-list span {
      display: inline-block;
      width: 70px;
      font-weight: 600;
      color: #764ba2;
    }

    .footer {
      text-align: center;
      padding: 20px;
      font-size: 13px;
      color: #aaa;
      border-top: 1px solid #eee;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="header">
      <div class="avatar">👋</div>
      <h1>홍길동</h1>
      <p>프론트엔드 개발자 · Web Developer</p>
    </div>

    <div class="content">
      <div class="section">
        <h2>소개</h2>
        <p>
          안녕하세요! 사용자 경험을 중요하게 생각하는 개발자입니다.
          새로운 기술을 배우는 것을 좋아하고, 작은 디테일까지 신경 쓰는
          깔끔한 코드를 지향합니다.
        </p>
      </div>

      <div class="section">
        <h2>기술 스택</h2>
        <div class="skills">
          <span class="skill">HTML</span>
          <span class="skill">CSS</span>
          <span class="skill">JavaScript</span>
          <span class="skill">React</span>
          <span class="skill">Node.js</span>
          <span class="skill">Git</span>
        </div>
      </div>

      <div class="section">
        <h2>연락처</h2>
        <ul class="contact-list">
          <li><span>Email</span> hong@example.com</li>
          <li><span>GitHub</span> github.com/honggildong</li>
          <li><span>Blog</span> blog.example.com</li>
        </ul>
      </div>
    </div>

    <div class="footer">
      © 2026 홍길동. All rights reserved.
    </div>
  </div>
</body>
</html>
